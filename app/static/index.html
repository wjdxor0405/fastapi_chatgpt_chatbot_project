<!-- app/static/index.html -->
<!-- ------------------------------------------------------------ -->
<!-- FastAPI가 제공하는 챗봇 화면입니다. -->
<!-- 제공된 React 예제의 floating chatbot UI를 순수 HTML/CSS/JS 구조로 다시 구현했습니다. -->
<!-- ------------------------------------------------------------ -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- 브라우저가 한글을 정상 표시하도록 UTF-8 문자셋을 지정합니다. -->
    <meta charset="UTF-8" />

    <!-- 모바일 화면에서도 레이아웃이 화면 너비에 맞게 표시되도록 설정합니다. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 브라우저 탭에 표시될 제목입니다. -->
    <title>FastAPI ChatGPT ChatBot</title>

    <!-- 별도로 작성한 CSS 파일을 연결합니다. -->
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <!-- 전체 페이지의 메인 영역입니다. -->
    <main class="page">
        <!-- 프로젝트 제목과 설명을 표시하는 영역입니다. -->
        <section class="hero">
            <h1>FastAPI ChatGPT 챗봇 앱</h1>
            <p>오른쪽 아래 챗봇 버튼을 눌러 질문을 입력하세요.</p>
            <p class="notice">API 키가 없으면 데모 모드로 동작하고, API 키를 설정하면 실제 ChatGPT 응답을 받습니다.</p>
        </section>
    </main>

    <!-- 오른쪽 아래에 고정되는 챗봇 열기 버튼입니다. -->
    <button id="chatIcon" class="chat-icon" type="button" aria-label="챗봇 열기">
        💬
    </button>

    <!-- 챗봇 모달 창 전체를 감싸는 영역입니다. hidden 클래스가 있으면 보이지 않습니다. -->
    <section id="chatModal" class="chat-modal hidden" aria-label="챗봇 대화창">
        <!-- 챗봇 모달의 상단 제목 영역입니다. -->
        <header class="chat-header">
            <strong>ChatGPT ChatBot</strong>
            <div class="header-actions">
                <!-- 설정 패널을 열고 닫는 버튼입니다. -->
                <button id="toggleSettings" class="icon-button" type="button" aria-label="설정 열기/닫기" title="설정">⚙</button>
                <!-- 대화 내용을 모두 지우는 버튼입니다. -->
                <button id="clearChat" class="icon-button" type="button" aria-label="대화 초기화" title="대화 초기화">🗑</button>
                <!-- 챗봇을 닫는 버튼입니다. -->
                <button id="closeChat" class="close-button" type="button" aria-label="챗봇 닫기">×</button>
            </div>
        </header>

        <!-- 모델과 생성 옵션을 설정하는 패널입니다. hidden 클래스가 있으면 숨겨집니다. -->
        <div id="settingsPanel" class="settings-panel hidden">
            <!-- system 지시문: 챗봇의 역할과 답변 규칙을 지정합니다. -->
            <label class="setting-row">
                <span class="setting-label">System instruction</span>
                <textarea id="systemInstruction" class="setting-textarea" rows="3"
                    placeholder="예) 너는 초보자에게 친절하게 설명하는 파이썬 강사다."></textarea>
            </label>

            <!-- 모델명 입력입니다. 자주 쓰는 모델은 아래 목록에서 선택할 수 있습니다. -->
            <label class="setting-row">
                <span class="setting-label">Model</span>
                <input id="modelInput" class="setting-input" type="text" list="modelList"
                    placeholder="gpt-4o-mini" autocomplete="off" />
                <datalist id="modelList">
                    <option value="gpt-4o-mini"></option>
                    <option value="gpt-4o"></option>
                    <option value="gpt-4.1-mini"></option>
                    <option value="gpt-4.1"></option>
                    <option value="gpt-5"></option>
                    <option value="gpt-5-mini"></option>
                    <option value="o3-mini"></option>
                    <option value="o4-mini"></option>
                </datalist>
            </label>

            <!-- temperature와 top_p를 나란히 배치합니다. -->
            <div class="setting-grid">
                <label class="setting-row">
                    <span class="setting-label">Temperature (0~2)</span>
                    <input id="temperatureInput" class="setting-input" type="number"
                        min="0" max="2" step="0.1" placeholder="0.7" />
                </label>
                <label class="setting-row">
                    <span class="setting-label">Top&nbsp;p (0~1)</span>
                    <input id="topPInput" class="setting-input" type="number"
                        min="0" max="1" step="0.05" placeholder="1.0" />
                </label>
            </div>

            <!-- 최대 출력 토큰 수입니다. -->
            <label class="setting-row">
                <span class="setting-label">Max output tokens</span>
                <input id="maxTokensInput" class="setting-input" type="number"
                    min="1" max="32000" step="1" placeholder="1024" />
            </label>

            <!-- gpt-5 / o 계열 안내 문구입니다. -->
            <p class="setting-hint">
                gpt-5 · o 계열 모델에서는 temperature / top_p 설정이 자동으로 제외됩니다.
            </p>
        </div>

        <!-- 대화 메시지가 계속 추가되는 영역입니다. -->
        <div id="chatMessages" class="chat-messages"></div>

        <!-- 사용자 입력 폼입니다. Enter 또는 전송 버튼으로 메시지를 보냅니다. -->
        <form id="chatForm" class="chat-form">
            <input id="messageInput" class="chat-input" type="text" placeholder="질문을 입력하세요." autocomplete="off" />
            <button class="send-button" type="submit">전송</button>
        </form>
    </section>

    <!-- 챗봇 동작을 담당하는 JavaScript 파일을 연결합니다. -->
    <script src="/static/app.js"></script>
</body>
</html>
